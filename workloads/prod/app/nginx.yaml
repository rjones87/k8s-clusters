apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-prod
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-prod
  template:
    metadata:
      labels:
        app: nginx-prod
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-prod
  namespace: default
spec:
  selector:
    app: nginx-prod
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
