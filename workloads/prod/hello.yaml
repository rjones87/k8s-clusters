apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-prod
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-prod
  template:
    metadata:
      labels:
        app: hello-prod
    spec:
      containers:
        - name: hello
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-prod
  namespace: default
spec:
  selector:
    app: hello-prod
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
