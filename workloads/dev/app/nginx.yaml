apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-dev
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-dev
  template:
    metadata:
      labels:
        app: nginx-dev
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-dev
  namespace: default
spec:
  selector:
    app: nginx-dev
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
