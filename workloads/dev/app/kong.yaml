apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config-dev
  namespace: default
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: hello-dev-service
        url: http://hello-dev.default.svc.cluster.local:80/hello
        routes:
          - name: hello-dev-route
            paths:
              - /api/hello
            strip_path: true
      - name: nginx-dev-service
        url: http://nginx-dev.default.svc.cluster.local:80
        routes:
          - name: nginx-dev-route
            paths:
              - /nginx
            strip_path: true
      - name: comments-dev-service
        url: http://comments-dev.default.svc.cluster.local:80/comments
        routes:
          - name: comments-dev-route
            paths:
              - /api/comments
            strip_path: true
      - name: api-docs-dev-service
        url: http://api-docs-dev.default.svc.cluster.local:80
        routes:
          - name: api-docs-dev-route
            paths:
              - /docs/api
            strip_path: false
      - name: comments-ui-dev-service
        url: http://comments-ui-dev.default.svc.cluster.local:80
        routes:
          - name: comments-ui-dev-route
            paths:
              - /comments
            strip_path: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-dev
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-dev
  template:
    metadata:
      labels:
        app: kong-dev
    spec:
      containers:
        - name: kong
          image: kong:3.9
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong_dbless/kong.yml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_LISTEN
              value: "off"
          ports:
            - name: proxy
              containerPort: 8000
            - name: proxy-ssl
              containerPort: 8443
          volumeMounts:
            - name: kong-config
              mountPath: /kong_dbless
      volumes:
        - name: kong-config
          configMap:
            name: kong-config-dev
---
apiVersion: v1
kind: Service
metadata:
  name: kong-dev
  namespace: default
spec:
  selector:
    app: kong-dev
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort
