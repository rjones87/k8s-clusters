apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-dev
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-dev
  template:
    metadata:
      labels:
        app: hello-dev
    spec:
      containers:
        - name: hello
          image: nginxdemos/hello:plain-text
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello-dev
  namespace: default
spec:
  selector:
    app: hello-dev
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
