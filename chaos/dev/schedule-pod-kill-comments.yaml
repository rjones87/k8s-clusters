apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: schedule-pod-kill-comments
  namespace: chaos-mesh
spec:
  schedule: "@every 10s"
  concurrencyPolicy: Forbid
  historyLimit: 1
  type: PodChaos
  podChaos:
    action: pod-kill
    mode: all
    selector:
      namespaces:
        - default
      labelSelectors:
        app: comments-dev
